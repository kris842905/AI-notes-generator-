version: '3.8'

services:
  # MySQL Relational Database
  mysql:
    image: mysql:8.0
    container_name: student_notes_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=notes_generator
      - MYSQL_USER=student_user
      - MYSQL_PASSWORD=student_pass
      - MYSQL_ROOT_PASSWORD=root_pass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: student_notes_vector
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend REST API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student_notes_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:mysql://mysql:3306/notes_generator?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - DATABASE_USERNAME=student_user
      - DATABASE_PASSWORD=student_pass
      - CHROMADB_URL=http://chromadb:8000
      - TESSERACT_DATAPATH=/usr/share/tesseract-ocr/tessdata
      # AI and Storage properties - values should be replaced with real credentials
      - GEMINI_API_KEY=YOUR_GEMINI_API_KEY_HERE
      - CLOUDINARY_CLOUD_NAME=YOUR_CLOUDINARY_CLOUD_NAME
      - CLOUDINARY_API_KEY=YOUR_CLOUDINARY_API_KEY
      - CLOUDINARY_API_SECRET=YOUR_CLOUDINARY_API_SECRET
      - JWT_SECRET=9a4f2c8d3e7b1a5c6d8e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_healthy

  # React Frontend (Nginx Proxy)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student_notes_ui
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local
  chroma_data:
    driver: local
